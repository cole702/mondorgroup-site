<!DOCTYPE html>
<html lang="en-CA">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; base-uri 'none'" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Page not found · Mondor Group</title>
<meta name="theme-color" content="#070708" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<style>
  @font-face{font-family:'Montserrat';font-style:normal;font-weight:300 500;font-display:swap;src:url('/fonts/montserrat.woff2') format('woff2');}
  @font-face{font-family:'Spectral';font-style:normal;font-weight:300;font-display:swap;src:url('/fonts/spectral-300.woff2') format('woff2');}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:2rem 1.6rem;
    font-family:'Spectral',Georgia,serif;color:#d4d4d6;background:#070708;
    background-image:radial-gradient(ellipse 90% 70% at 50% 40%, #16161b 0%, #0a0a0c 52%, #050506 100%);
    -webkit-font-smoothing:antialiased;
  }
  .mark{font-family:'Montserrat',sans-serif;font-weight:300;line-height:1;margin-bottom:2.6rem;}
  .mark .t{display:block;font-size:clamp(1.4rem,5vw,2rem);letter-spacing:.26em;text-indent:.26em;text-transform:uppercase;color:#e9e9ea;}
  .mark .r{display:block;height:1px;width:3.2rem;margin:.55rem auto;background:rgba(212,212,214,.55);}
  .mark .b{display:block;font-size:clamp(.6rem,2.4vw,.85rem);letter-spacing:.6em;text-indent:.6em;text-transform:uppercase;color:#bdbdc2;}
  .code{font-family:'Montserrat',sans-serif;font-weight:300;font-size:clamp(3rem,12vw,5rem);letter-spacing:.12em;text-indent:.12em;color:#f1f1f2;}
  .msg{margin-top:.8rem;font-size:1.1rem;font-weight:300;color:#8c8c93;}
  .home{
    margin-top:2.6rem;font-family:'Montserrat',sans-serif;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:#d4d4d6;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.18);padding:.4rem .3rem .4rem;
    transition:border-color .3s ease,color .3s ease;
  }
  .home:hover{color:#fff;border-color:#d4d4d6;}
  .home:focus-visible{outline:1px solid #d4d4d6;outline-offset:4px;border-radius:1px;}
</style>
</head>
<body>
  <div class="mark"><span class="t">Mondor</span><span class="r"></span><span class="b">Group</span></div>
  <div class="code">404</div>
  <p class="msg">That page doesn't exist.</p>
  <a class="home" href="/">Return home</a>
</body>
</html>
